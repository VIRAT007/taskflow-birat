services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - taskflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://taskflow:taskflow@postgres:5432/taskflow?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-docker-change-me-16chars}
      # Run `prisma db seed` after migrations (test@example.com + demo data). Set RUN_SEED=false to skip.
      RUN_SEED: ${RUN_SEED:-true}
      TASKFLOW_API_PORT: ${BACKEND_PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SAME_ORIGIN_API: "true"
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      TASKFLOW_FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      TASKFLOW_API_PORT: ${BACKEND_PORT:-3000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  taskflow_pgdata:
