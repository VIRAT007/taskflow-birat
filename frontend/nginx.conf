server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Variable upstream + Docker DNS so nginx starts even if `backend` is not
  # resolvable yet. With variables, nginx does not apply the same URI rewrite as
  # `proxy_pass http://backend:3000/`, so strip `/api` explicitly (match Vite dev proxy).
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    # `set` must run before `rewrite ... break`, which stops further rewrite-phase
    # directives (otherwise $taskflow_api stays empty and proxy_pass fails).
    set $taskflow_api http://backend:3000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $taskflow_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
